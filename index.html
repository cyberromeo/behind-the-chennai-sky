<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Beneath the Chennai Sky</title>
  <meta name="description" content="Beneath the Chennai Sky — An immersive lyrical experience. Listen, feel, drift.">

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://chennaisky.vercel.app/">
  <meta property="og:title" content="Beneath the Chennai Sky">
  <meta property="og:description" content="An immersive lyrical experience by RIKA AND SRIHARI.">
  <meta property="og:image" content="https://chennaisky.vercel.app/og-image.jpg">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://chennaisky.vercel.app/">
  <meta name="twitter:title" content="Beneath the Chennai Sky">
  <meta name="twitter:description" content="An immersive lyrical experience by RIKA AND SRIHARI.">
  <meta name="twitter:image" content="https://chennaisky.vercel.app/og-image.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

  <!-- Starfield Canvas -->
  <canvas id="starfield"></canvas>

  <!-- ═══════════════ INTRO SCREEN ═══════════════ -->
  <section id="intro-screen" class="screen active">
    <div class="intro-content">
      <div class="album-art-intro" data-delay="200">
        <div class="art-glow"></div>
        <img src="album-art.jpg" alt="Beneath the Chennai Sky — Album Art" class="album-img-intro">
      </div>
      <div class="intro-line intro-line-1" data-delay="0">beneath</div>
      <div class="intro-line intro-line-2" data-delay="400">the chennai</div>
      <div class="intro-line intro-line-3" data-delay="800">sky</div>

      <div class="intro-subtitle" data-delay="1400">
        <span class="subtitle-dash"></span>
        <span class="subtitle-text">a lyrical journey</span>
        <span class="subtitle-dash"></span>
      </div>

      <div class="intro-meta" data-delay="1900">
        <p class="meta-line">RIKA AND SRIHARI</p>
      </div>

      <button id="start-btn" class="start-button" data-delay="2400">
        <span class="btn-text">Start Listening</span>
        <span class="btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </span>
      </button>
    </div>

    <div class="scroll-hint" data-delay="3000">
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- ═══════════════ PLAYER SCREEN ═══════════════ -->
  <section id="player-screen" class="screen">
    <div class="player-wrapper">

      <!-- Top Bar -->
      <div class="player-top-bar">
        <div class="now-playing-indicator">
          <span class="bar bar-1"></span>
          <span class="bar bar-2"></span>
          <span class="bar bar-3"></span>
          <span class="bar bar-4"></span>
        </div>
        <span class="now-playing-text">Now Playing</span>
      </div>

      <!-- Album Art + Track Info -->
      <div class="track-header">
        <div class="album-art-player">
          <img src="album-art.jpg" alt="Album Art" class="album-img-player" id="album-img-player">
        </div>
        <div class="track-info">
          <h1 class="track-title">Beneath the Chennai Sky</h1>
          <p class="track-artist">RIKA AND SRIHARI</p>
        </div>
      </div>

      <!-- Lyrics Container -->
      <div id="lyrics-viewport" class="lyrics-viewport">
        <div id="lyrics-container" class="lyrics-container">
          <!-- Lyrics injected by JS -->
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-wrapper" id="progress-wrapper">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <div class="time-display">
          <span id="current-time">0:00</span>
          <span id="total-time">0:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="prev-btn" class="control-btn secondary" aria-label="Previous">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>
        <button id="play-pause-btn" class="control-btn primary" aria-label="Play/Pause">
          <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <svg class="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button id="next-btn" class="control-btn secondary" aria-label="Next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
      </div>

    </div>
  </section>

  <!-- Audio element -->
  <audio id="audio-player" preload="auto">
    <source src="track.mp3" type="audio/mpeg">
  </audio>

  <script src="app.js"></script>
</body>
</html>
